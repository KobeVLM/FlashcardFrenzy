# ==============================
# Server
# ==============================
server.port=${PORT:8080}

# ==============================
# Database — Supabase PostgreSQL
# Replace values here OR set them as environment variables on Render.
# Environment variables take priority and are the correct approach for deployment.
# ==============================
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?user=postgres.rmaayldsnyhzzfsqfvlb&password=7CntZ5oAuFzmYwxS&prepareThreshold=0
spring.datasource.username=postgres.rmaayldsnyhzzfsqfvlb
spring.datasource.password=7CntZ5oAuFzmYwxS
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT
# Access token:  24 hours  (86400000 ms)
# Refresh token: 7 days   (604800000 ms)
# Secret must be 32+ characters. Set via environment variable in production.
# ==============================
jwt.secret=${JWT_SECRET:change_this_to_a_strong_secret_key_at_least_32_chars}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==============================
# Rate Limiting — login endpoint
# Max 10 attempts per minute per IP address
# ==============================
rate-limit.login.capacity=10
rate-limit.login.refill-minutes=1

# ==============================
# CORS
# Add your deployed Vercel URL here or set via environment variable.
# ==============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ==============================
# Logging
# ==============================
logging.level.com.flashcardfrenzy=INFO
logging.level.org.springframework.security=WARN
